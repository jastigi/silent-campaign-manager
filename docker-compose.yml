services:

  postgres:
    image: postgres:17
    container_name: scm-postgres

    environment:
      POSTGRES_DB: silent_campaign_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: silent-campaign-manager

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/silent_campaign_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

    depends_on:
      - postgres

volumes:
  postgres_data: