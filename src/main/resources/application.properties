spring.application.name=silent-campaign-manager

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/silent_campaign_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:scm_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:scm_password}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR

jwt.secret=mySuperSecretKeyForSilentCampaignManager2026!!SCM
jwt.expiration=86400000