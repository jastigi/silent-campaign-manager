spring.application.name=silent-campaign-manager

spring.datasource.url=jdbc:postgresql://localhost:5432/silent_campaign_db
spring.datasource.username=scm_user
spring.datasource.password=scm_password

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect